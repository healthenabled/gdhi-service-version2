server:
  port: 8888
spring:
  jmx:
    enabled: false
  jpa:
    showSql: true
    formatSql: true
    hibernate:
      ddlAuto: true
      namingStrategy : org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
      physicalNamingStrategy : it.CustomPhysicalNamingStrategyImpl
      dialect: org.hibernate.dialect.PostgreSQL94Dialect
  flyway:
    enabled: true
    baseline-version: 1
    baseline-on-migrate: true
    locations:classpath: db/migration
    out-of-order: true
    table: schema_version

db:
  url: jdbc:postgresql://localhost:5432/gdhi_test
  host: localhost
  port: 5432
  username: gdhi_test
  password: testpassword
  driverClassName: org.postgresql.Driver

aws:
  accessKey: test-access-key
  secretKey: test-secret-key
  region: us-east-1
  bedrock:
    agentId: test-english-agent
    agentAliasId: test-english-alias
    agents:
      en:
        agentId: test-english-agent
        agentAliasId: test-english-alias
      es:
        agentId: test-spanish-agent
        agentAliasId: test-spanish-alias
      ar:
        agentId: test-arabic-agent
        agentAliasId: test-arabic-alias
      pt:
        agentId: test-portuguese-agent
        agentAliasId: test-portuguese-alias
      fr:
        agentId: test-french-agent
        agentAliasId: test-french-alias
